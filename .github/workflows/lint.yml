name: Hadolint

on:
  pull_request:
    branches:
      - master
    paths:
      - '**/Dockerfile'
      - '.github/workflows/lint.yml'

jobs:
  hadolint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
      with:
        recursive: true
